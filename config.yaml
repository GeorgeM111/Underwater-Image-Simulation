# =============================================================================
# Centralised configuration for the underwater-image / depth-estimation project.
#
# Every script reads its paths and hyper-parameters from this file (via
# `config.py`). Override any value on the command line where the script exposes
# an argparse flag, or point `--config` at a different YAML file.
# =============================================================================

# --- Paths — NYU --------------------------------------------------------------
nyu_zip_path:      "${PROJECT_DATA}/nyu_data.zip"
nyu_gt_train_dir:  "${PROJECT_DATA}/ground_truth/nyu/train"
nyu_gt_test_dir:   "${PROJECT_DATA}/ground_truth/nyu/test"

# --- Paths — Make3D -----------------------------------------------------------
make3d_train_img_dir:   "${PROJECT_DATA}/Make3D/Train400Img"
make3d_train_depth_dir: "${PROJECT_DATA}/Make3D/Train400Depth"
make3d_test_img_dir:    "${PROJECT_DATA}/Make3D/Test134"
make3d_test_depth_dir:  "${PROJECT_DATA}/Make3D/Test134Depth/Gridlaserdata"
make3d_gt_train_dir:    "${PROJECT_DATA}/ground_truth/make3d/train"
make3d_gt_test_dir:     "${PROJECT_DATA}/ground_truth/make3d/test"

# --- Paths — KITTI (raw images + completed/annotated depth, depth_m = png/256) ----
kitti_raw_dir:              "${PROJECT_DATA}/kitti"
# Completed-depth root with train/ and val/:  <dir>/<split>/<drive>/proj_depth/groundtruth/image_02/<frame>.png
kitti_completed_depth_dir:  "${PROJECT_DATA}/kitti/completed_depth"
kitti_gt_train_dir:         "${PROJECT_DATA}/ground_truth/kitti/train"
kitti_gt_test_dir:          "${PROJECT_DATA}/ground_truth/kitti/test"
kitti_max_depth_m:          80.0
# Option B: scale per-metre Jerlov beta for the KITTI classical haze (0-80 m depths
# would otherwise extinguish to flat airlight). 10/80 matches NYU. True depth kept.
kitti_haze_beta_scale:      0.125
kitti_full_size: [1216, 352]   # [W,H], /32-divisible; KITTI frames ~1242x375
kitti_half_size: [608, 176]    # decoder / GT resolution (half of full)
kitti_airlight_brightness_min: 0.5
# Informative-subset selection for KITTI (filter_kitti_subset.py)
kitti_subset_size:       10000
kitti_subset_w_entropy:  0.3333
kitti_subset_w_gradient: 0.3333
kitti_subset_w_depth:    0.3333
# Train/test selection (mirrors nyu_train_mode / nyu_test_mode)
kitti_train_mode:   "subset"    # "subset" -> filtered indices | "all" -> full train split
kitti_subset_indices:           # blank -> auto ({kitti_subset_size}_filtered_kitti.npy)
kitti_test_mode:    "tail"      # "tail" -> held-out tail of train | "official" -> val split
# Pre-computed KITTI parameter matrices
beta_mat_kitti_train: "${PROJECT_DATA}/parameters/Beta_Mat_KITTI_train.npy"
a_mat_kitti_train:    "${PROJECT_DATA}/parameters/A_Mat_KITTI_train.npy"
beta_mat_kitti_test:  "${PROJECT_DATA}/parameters/Beta_Mat_KITTI_test.npy"
a_mat_kitti_test:     "${PROJECT_DATA}/parameters/A_Mat_KITTI_test.npy"

# --- Paths — Pre-computed parameter matrices ----------------------------------
beta_mat_nyu_train:    "${PROJECT_DATA}/parameters/Beta_Mat_NYU_train.npy"
beta_mat_nyu_test:     "${PROJECT_DATA}/parameters/Beta_Mat_NYU_test.npy"
a_mat_nyu_train:       "${PROJECT_DATA}/parameters/A_Mat_NYU_train.npy"
a_mat_nyu_test:        "${PROJECT_DATA}/parameters/A_Mat_NYU_test.npy"
beta_mat_make3d_train: "${PROJECT_DATA}/parameters/Beta_Mat_Make_3D_Train.npy"
beta_mat_make3d_test:  "${PROJECT_DATA}/parameters/Beta_Mat_Make_3D_Test.npy"
a_mat_make3d_train:    "${PROJECT_DATA}/parameters/A_Mat_Make_3D_Train.npy"
a_mat_make3d_test:     "${PROJECT_DATA}/parameters/A_Mat_Make_3D_Test.npy"

# --- Paths — Outputs ----------------------------------------------------------
checkpoint_dir: "${PROJECT_OUT}/checkpoints"
runs_dir:       "${PROJECT_OUT}/runs"

# --- Training -----------------------------------------------------------------
# batch 32 + lr 1.4e-4 (sqrt-scaled from the DenseDepth reference of Adam @ 1e-4, batch 16).
# On the FULL 46,227-image training split that is 1,444 steps/epoch => 72k updates over 50
# epochs, which is ample. This architecture IS DenseDepth, so staying near its proven regime
# is the safe choice; a larger batch mostly buys wall-clock at the cost of updates.
#   bs 64 -> lr 2.0e-4 (722 steps/epoch)  -- fine, faster
#   bs 90 -> lr 2.4e-4 (513 steps/epoch)  -- only 26k updates; the residual learns the
#                                            scattering blur LAST, so do not starve it.
# If you change batch_size_nyu, scale learning_rate by sqrt(new/16) * 1e-4.
batch_size_nyu:          32
batch_size_make3d:       5
epochs:                  50
learning_rate:           1.4e-4    # sqrt-scaled for batch 32 (see above). The paper's 1e-6 is
                                   # ~100x too low for this architecture and leaves the depth head
                                   # near its initialisation.
gan_learning_rate:       2.0e-4    # canonical Pix2Pix/CycleGAN LR (Isola/Zhu et al.); GAN
                                   # baselines use this instead of the 1e-4 above.
early_stopping_patience: 8     # the residual learns the scattering blur LATE; give it room
train_split_ratio:       0.96
num_workers:             8     # H200 node has 64 cores; raise for faster data loading (was 4)
n_parallel_jobs:         6     # for GT pre-computation; each worker loads the full ~5GB NYU zip, so keep low to avoid OOM

# --- Acceleration (see utils/accel.py) ----------------------------------------
# amp: bf16 autocast on the model forwards. H200 has huge bf16 throughput -> ~1.5-2x
# and half the activation memory. bf16 needs no GradScaler. Set false for an exact
# fp32 run (e.g. to byte-match a previous fp32 checkpoint). amp_dtype: bfloat16|float16.
amp:        true
amp_dtype:  bfloat16

# --- Informative-subset selection (filter_nyu_subset.py) ----------------------
# Composite score = w_ent*entropy + w_grad*gradient + w_depth*depth_range,
# each term min-max normalised across the dataset. Weights need not sum to 1.
nyu_subset_size:       10000   # number of most-informative NYU images to keep
nyu_subset_w_entropy:  0.3333  # weight: Shannon entropy of the grayscale image
nyu_subset_w_gradient: 0.3333  # weight: mean Sobel gradient magnitude (detail)
nyu_subset_w_depth:    0.3333  # weight: depth range (max-min over valid pixels)
# SSIM diversity pass: after ranking by score, accept an image only if its SSIM
# to every already-accepted image is below this threshold (drops near-duplicates,
# e.g. consecutive video frames), backfilling from lower-ranked images until the
# subset is full. Lower = more diverse / stricter. Computed on ssim_thumb thumbnails.
nyu_subset_ssim_threshold: 0.6
nyu_subset_ssim_thumb:     32

# How NYU techniques/baselines pick their training set (data.nyu.get_train_loader):
#   nyu_train_mode: "all"    -> full NYU training split
#                   "subset" -> only the indices in nyu_subset_indices
# nyu_subset_indices: path to the .npy of indices; leave blank to auto-use
#   {nyu_subset_size}_filtered_nyu.npy in the parameters dir.
# "all" = the paper's protocol: the FULL 50,688-image set, 96% train / 4% test.
# It also removes an entire class of bug: with "subset" the GT generator writes only the
# filtered TRAINING indices while the test loader reads the TAIL, so the tail GT silently goes
# stale on every physics change. With "all", every index has GT by construction.
nyu_train_mode:     "all"    # "all" -> whole dataset (paper protocol) | "subset" -> filtered subset
nyu_subset_indices:            # blank -> auto ({nyu_subset_size}_filtered_nyu.npy)

# How the NYU test set is chosen (data.nyu.get_test_loader):
#   "tail"     -> held-out tail of nyu2_train (paper's 96/4 protocol; DEFAULT)
#   "official" -> official NYU-v2 654 test set (nyu2_test.csv + *_NYU_test params/GT)
nyu_test_mode:      "tail"
# Fraction of the NYU training pool held out for validation (checkpoint selection +
# early stopping), mirroring data.make3d. Separate from train_split_ratio (test tail).
nyu_val_ratio:      0.05

# Seed for parameter-matrix (beta / atmospheric-light) generation, so regenerating
# them is reproducible and cannot silently desync from the pre-computed GT.
random_seed:        42

# --- Loss weights -------------------------------------------------------------
# Paper Eq.7/10/14/18 fix all four lambdas at 0.1 (base variants).
lambda_l1:   0.1
lambda_ssim: 0.1
lambda_perc: 0.1   # Technique 4 only (VGG perceptual term)

# DenseDepth edge/gradient term on depth (NOT in the paper — a repo addition that keeps the
# depth map from going blurry).
#
# 0.25, NOT 1.0. This was the cause of the depth head collapsing to a constant.
# 1.0 is DenseDepth's own ratio (edge 1.0 vs L1 0.1), but DenseDepth's depth head is an
# UNBOUNDED Conv2d. Ours is a BOUNDED scaled sigmoid (models/decoder_1ch.py), and a 10:1
# gradient-term weight drives the pre-activation far negative within ~10 optimizer steps. The
# sigmoid then saturates, its derivative goes to ~0, AND t = exp(-beta*z) -> 0 at the same
# time, so NEITHER loss can pull it back: out_depth is pinned at the floor (1.0) forever.
#   Symptom: a WHITE depth panel in TensorBoard; stats/out_depth_min == max == 1.0 from epoch 1;
#            loss/depth frozen at a constant while loss/total keeps falling.
# Reproduced and bisected: lambda_grad 1.0 -> collapse; 0.25 / 0.1 / 0.0 -> converges.
# 0.25 keeps a meaningful edge term (2.5x the L1 weight) without saturating the head.
lambda_grad: 0.25

# --- Learned loss weights (var1 / var2) ---------------------------------------
# The paper's Eq.12/13/17/21 learn the loss weights with NO regulariser. That objective is
# LINEAR in w, so its exact minimiser is a VERTEX (one-hot on argmin_i L_i) and there is no
# restoring force: as w -> 0 the term stops getting gradient, stays large, and the sign
# never flips. Every var2 run collapsed this way — the depth head, whose only gradient path
# is L_depth, froze at init and the physics degenerated to flat airlight (gray/white frames).
#
# Three independent mechanisms are needed; none alone is sufficient:
#   weight_floor        -- no weight may fall below this (removes the vertex)
#   lambda_weight_reg   -- log-barrier -sum(log w) added to the TRAINING total
#   loss_ema_momentum   -- EMA scale-normalisation so terms in different units compete fairly
#                          (loss_depth is O(1-10) in the reciprocal domain; the image losses
#                           are O(0.1-0.5), so loss_depth was never the argmin)
# Set weight_floor: 0.0 and lambda_weight_reg: 0.0 to reproduce the paper exactly.
weight_floor:       0.05
lambda_weight_reg:  0.01
loss_ema_momentum:  0.99
# Paper's supplementary puts Dropout(0.5) at every stage of the weight head. That head maps
# a 256-d pooled vector to 2-4 scalars (nothing to regularise) and the weights are
# MULTIPLICATIVE on the losses, so dropout noise there noises every gradient in the network.
# It also makes E_train[w] != w_eval, so the train objective and the val/checkpoint objective
# are different functions. Set to 0.5 to restore the paper's value.
weight_head_dropout: 0.1

# --- Depth / physics coupling -------------------------------------------------
# pred_complex = haze(z) + residual. The residual is a full 3-channel decoder and is FAR more
# expressive than the depth path, so if the complex-image loss L_p is allowed to backprop into
# the depth head, descent takes the shortcut: drive the depth to a CONSTANT (making haze a
# trivial global colour transform) and let the residual reconstruct everything. The predicted
# IMAGE still looks fine; the DEPTH MAP degenerates to a flat field.
#   Symptom: a WHITE depth panel in TensorBoard, and stats/out_depth_min == out_depth_max.
#
# false (default) -> L_p reaches the depth head. This is paper Eq.11 read literally:
#                    I_Simulated = t(I_Depth)*I + (1-t)*A + I_Residue, so the image loss MUST
#                    backprop through the transmission t into the depth head — that coupling is
#                    the "physics-informed" part of the method.
# true            -> detach (what the original code did). Depth is then supervised only by L_d,
#                    plus L_t in Techniques 2/3/4 (the loss on the INITIAL DEGRADED image, which
#                    has no residual term and so cannot be satisfied by a wrong depth).
#
# NOTE: the depth-collapse-to-constant bug was NOT caused by this flag — it was lambda_grad
# (see above), and it reproduced identically with detach ON and OFF. This flag is kept so the
# coupling can be A/B tested, not as a workaround.
detach_depth_in_complex: false

# --- Optimisation stability ---------------------------------------------------
grad_clip_norm:      1.0     # global-norm clip between backward() and step(); 0 disables
weight_head_lr_mult: 0.1     # weight heads emit MULTIPLICATIVE scalars -> train them slower
lr_min:              1.0e-6  # cosine-annealing floor
max_nonfinite_batches_per_epoch: 50  # abort the epoch if the loss is non-finite this often

# --- Physics — classical model (Jerlov, per-metre) ----------------------------
# IMPORTANT: in water RED is attenuated the MOST and blue/green the least
# (paper, Sec 3.1: "attenuation of red colors can be an order of magnitude
# larger than blue and green"). The original config had the red and blue lists
# swapped (red ~0.02, blue ~0.4), which inverted the colour physics and made
# scenes reddish instead of blue-green. Corrected below.
beta_val_r: [0.357,  0.416,  0.528,  0.364,  0.423,  0.523]
beta_val_g: [0.0398, 0.0598, 0.0460, 0.0661]
beta_val_b: [0.0192, 0.0182, 0.0263, 0.0253]

# --- Physics — complex model (ricardo) ----------------------------------------
# complex_beta is the transmission coefficient for the ricardo model. It is
# SEPARATE from the classical Jerlov beta_val above because the ricardo model
# runs on a per-image 0-255 normalised depth axis, not metres. Feeding the
# per-metre Jerlov betas here drove exp(-beta*z) with z up to 255 to ~0,
# collapsing every complex GT to a flat (gray) atmospheric-light frame.
complex_beta: [0.020, 0.005, 0.010]   # fallback water type (superseded by jerlov_water_types)

# Per-image water-type menu (classical Jerlov scale, [R, G, B] attenuation). ONE
# type is sampled per image and drives the classical haze, the ricardo
# transmission AND the airlight -> images vary blue<->green. Red is always
# attenuated most. Oceanic: blue least attenuated (B<G<R). Coastal: green least (G<B<R).
jerlov_water_types:
  - [0.30, 0.05, 0.02]   # oceanic I
  - [0.32, 0.06, 0.03]   # oceanic IA
  - [0.34, 0.07, 0.04]   # oceanic IB
  - [0.38, 0.08, 0.05]   # oceanic II
  - [0.42, 0.09, 0.07]   # oceanic III
  - [0.40, 0.06, 0.08]   # coastal 1C
  - [0.45, 0.07, 0.11]   # coastal 3C
  - [0.50, 0.09, 0.15]   # coastal 5C
  - [0.55, 0.11, 0.19]   # coastal 7C
  - [0.62, 0.13, 0.24]   # coastal 9C
# Maps a classical Jerlov beta (haze axis ~[0,10]) to the ricardo 0-255 axis:
# beta_ricardo = beta * complex_beta_scale.
complex_beta_scale: 0.04
# Airlight/veiling colour = normalise(exp(-beta_ricardo * airlight_bg_depth)) -> red-depleted.
airlight_bg_depth: 150.0
# Airlight brightness ~ uniform(min, 1) per image, PER DATASET so regenerating one
# split never changes the other's colours. Raising the floor stops ~30% of images
# being dark/murky. Only affects the split you regenerate (params + GT). Back to 0.0
# + regenerate == exact original matrices (RNG sequence is floor-independent).
# Airlight (veiling light) brightness ~ Uniform(min, 1.0), sampled PER IMAGE.
#
# NYU floor raised 0.0 -> 0.6. The veil term in Eq.1 is (1 - t) * A, so a DARK airlight adds
# essentially nothing: the image gets colour REMOVED (absorption) with nothing ADDED, and the
# result is a tinted-but-clear photo with dark, sharp shadows — a colour grade, not an
# underwater scene. With min=0.0 a third of images drew A < 0.33 and looked exactly like that.
# Real underwater backscatter is BRIGHT — it is what washes out contrast and turns shadows
# milky. A floor of 0.6 guarantees a visible veil on every image while still leaving variety
# in [0.6, 1.0].
# CHANGING THIS REQUIRES REGENERATING THE PARAMETER MATRICES (A_Mat) *AND* THE GT.
nyu_airlight_brightness_min:    0.6
make3d_airlight_brightness_min: 0.5    # applies on the NEXT Make3D params+GT regen
# Complex forward-model version. "ricardo" = original code behind the paper's figures.
# "v2" = corrected: untruncated Gaussian PSF (the fixed 21x21 window degenerated into a
# box filter for sigma>~7px), energy-conserving (1-k) scatter weighting (the old code
# used an unweighted source -> total radiance (1+k)J, a main cause of far-field wash-out),
# and Eq.6 hygiene. Flip to "ricardo" to reproduce the previous GT exactly.
complex_model: "v2"
# Scattering depth axis. "metric" (P3): sigma_px = f_px * gamma_angular * z_m * clarity.
# gamma_angular is ONE physical constant for all datasets; the pixel blur differs only
# because the CAMERAS differ (focal length) and because a dataset may be simulated under
# clearer water. "normalized" = the original per-image 0-255 axis (scene-dependent blur).
complex_depth_mode: "metric"
#
# WHY THESE ARE NEARLY FLAT ACROSS RGB (this is the "blue filter" fix).
#
# The v2 model is energy-conserving, so mean(complex_GT) == u * mean(haze_GT) at every
# depth BY CONSTRUCTION. The colour cast comes entirely from t = exp(-beta*z) and the
# red-depleted airlight — and that exact cast is ALREADY in the classical haze GT. So the
# complex model's only two differentiators are (a) forward-scatter blur and (b) particles.
#
# Both used to be switched off in the channel that matters. The old values were inherited
# from the legacy 0-255-axis constants (gamma: [0.1, 0.1, 0.043], B/R = 0.43) and were
# never re-derived on the metric axis, so BLUE — the channel that TRANSMITS (Jerlov
# beta_B ~ 0.05/m => t_B(2m) = 0.90) and therefore carries essentially all the visible
# scene structure — got the NARROWEST PSF and the LEAST scattering in the whole config
# (43% of red). Red was heavily blurred, but red is extinguished by t_R and replaced by
# airlight, so its blur was invisible. Net result: a SHARP original under a blue-green
# tint. That is exactly the "it's just a blue filter on the original" symptom.
#
# gamma_angular: the forward-scatter lobe width is set by particle size / diffraction
# (theta ~ lambda/D), so the R:B ratio should be ~1.44 at most, not 2.33. Flattened, with
# blue nudged slightly WIDER since blue is the surviving channel. Note gamma_eff =
# 259.43 * gamma = [1.09, 1.17, 1.25] px/m — every channel is now at or BELOW the old
# R/G value of 1.275 px/m, so nothing gets blurrier in radius than before. The blur simply
# lands where it can be seen.
#
# alpha_metric: the volume scattering coefficient of water is Rayleigh (~lambda^-4) plus a
# wavelength-neutral particulate term, so b_blue >= b_green >= b_red. The old config had
# this exactly BACKWARDS. Mean level 0.50 sits between the invisible 0.283 and the
# over-blurred 0.816 that produced the far-field mush.
#
# Predicted (NYU, f=259.43 px, clarity=1.0):
#   z= 2 m: sigma_px 2.18/2.33/2.49   scattered fraction (1-k) 0.59/0.63/0.67
#   z= 5 m: sigma_px 5.45/5.84/6.23   scattered fraction        0.90/0.92/0.94
#   z=10 m: sigma_px 10.9/11.7/12.5   scattered fraction        0.99/0.99/1.00
# (vs the rejected "too blurry" setting whose sigma_R hit 25.5 px @10 m.)
#
# NOTE: alpha is NOT bounded by beta. jerlov_water_types holds DIFFUSE attenuation
# coefficients K_d, not the beam attenuation c = a + b; in real water c ~ 3-10x K_d, so the
# scattering coefficient legitimately exceeds these betas. Forcing alpha <= beta would
# drive k -> 1, kill the scatter term, and collapse the complex GT onto the classical haze
# GT — i.e. a PURE blue filter, strictly worse.
#
# These are the TRUE per-metre constants, on a clarity=1.0 basis. They are SHARED by every
# dataset, so never rescale them to compensate for one dataset's turbidity — use that
# dataset's own clarity / beta_scale instead. (Doing exactly that once cut Make3D's
# scattering to 1/3 without any error, because gamma/alpha are shared but clarity is not.)
gamma_angular: [0.0042, 0.0045, 0.0048]  # rad/m, TRUE per-metre constant (clarity=1 basis)
alpha_metric:  [0.45,   0.501,  0.549 ]  # 1/m, TRUE per-metre constant (clarity=1 basis)
  # NOTE the 0.501/0.549: these EXACTLY reproduce the GT already on disk. They came from a
  # round-trip (the values were briefly stored divided by 3, and 0.50/3 rounds to 0.167).
  # 0.501 vs 0.500 is physically meaningless -- alpha is a free parameter the paper never
  # fixes -- so the exact numbers are kept rather than invalidate a trained model's GT.
# Focal length in PIXELS at each dataset's GT (half) resolution
nyu_focal_px:    259.43   # NYU-v2 official fx 518.8579 @640 -> /2
kitti_focal_px:  360.77   # KITTI P_rect_02 fx ~721.54 @1242; crop keeps f -> /2
make3d_focal_px: 246.60   # Make3D ships NO intrinsics -> assumed 50 deg HFOV @230 wide
# Water clarity per dataset: multiplies beta, alpha AND gamma together ("clearer water"
# = fewer absorption AND scattering events). Replaces the old *_haze_beta_scale, which
# scaled only beta. NYU = 1.0 (reference); Make3D/KITTI simulated under 8x clearer water
# so their 0-80 m scenes don't extinguish (same reason as Option-B).
# TURBIDITY multiplier (the name is backwards: LOWER = clearer water). Scales beta, alpha and
# gamma together.
#
# NYU = 3.0, not 1.0. NYU is an INDOOR dataset: scenes sit at 1-5 m. At clarity 1.0 with real
# oceanic Jerlov coefficients the blue channel still transmits 86% of the scene at 3 m and the
# veil is only 14% — i.e. red is removed and nothing is added, which is a COLOUR FILTER, not an
# underwater image. Real underwater photos lose contrast because bright backscatter is ADDED
# over the scene. To get that at indoor distances the water has to be genuinely turbid
# (harbour/coastal), which is what 3.0 represents: t_blue(3 m) 0.86 -> 0.64, veil 14% -> 36%.
# Make3D/KITTI are the opposite problem (0-80 m scenes), hence 0.125 = 8x clearer.
# TWO INDEPENDENT KNOBS PER DATASET. Absorption and scattering are separate physical
# processes in water: beta is the DIFFUSE ATTENUATION K_d, while alpha/gamma describe
# SCATTERING (beam attenuation c = a + b is typically 3-10x K_d). One shared multiplier
# cannot express "more veil, same blur", which is what NYU needs.
#   *_water_clarity -> SCATTERING  (scales alpha and gamma)
#   *_beta_scale    -> ATTENUATION (scales beta -> the colour cast and the veil)
#
# NYU: clarity 1.0 + beta_scale 3.0. NYU is INDOOR (1-5 m): at beta_scale 1.0 the blue channel
# still transmits 86% of the scene at 3 m and the veil is only 14% -- light is subtracted and
# nothing added, i.e. a COLOUR FILTER, not an underwater image. 3.0 = turbid harbour water.
# Make3D/KITTI: 0.125 on BOTH (their 0-80 m scenes would otherwise extinguish to flat airlight).
nyu_water_clarity:    1.0
nyu_beta_scale:       3.0
make3d_water_clarity: 0.125
make3d_beta_scale:    0.125
kitti_water_clarity:  0.125
kitti_beta_scale:     0.125
# --- Eq.6 particle field (LIVE on the v2/metric path) -------------------------
# Eq.6: I = u*I_sct + (1-u)*SP{sp_col, pr_c, sigma_c}
#
# These were effectively OFF. At u=0.99 the particle term contributed a mean of
# [0.05, 0.30, 0.30] gray levels with std 0.14 — BELOW one 8-bit LSB, i.e. invisible.
# And pr=0.15 seeds 15% of ALL pixels, which after a sigma=1.5 blur is a smooth
# low-contrast VEIL, not marine snow. So Eq.6 cost three Gaussian blurs per image and
# delivered a +-1-LSB dither.
#
# Now: sparse (1%), bright, near-white, ~1 px cores.
#   isolated particle peak = turbu_c/(2*pi*sigma^2) * (1-u) ~ 4.6 gray levels (clusters 8-12)
#   DC tint                = pr * turbu_c * (1-u)           ~ 0.24 gray levels (no cyan veil)
# Side effect of u=0.90: Eq.6 is a CONVEX mix, so I_sct is also scaled by 0.90 — the GT
# darkens ~10%. That is what Eq.6 prescribes. For less darkening use u: 0.95 with
# turbu_c: [245, 255, 255] and turbu_sigma: [0.8, 0.8, 0.8].
u:            0.90                 # Eq.6 mixing weight (was 0.99 -> particles invisible)
turbu_c:      [200.0, 235.0, 240.0]  # sp_col: bright near-white marine snow (was [34,200,201])
turbu_pr:     [0.010, 0.010, 0.010]  # Eq.6 pr_c: 1% seed density (was 0.15 -> a veil)
turbu_sigma:  [0.9, 0.9, 0.9]        # Eq.6 sigma_c: ~1 px particle core (was 1.5)
depth_levels: 16                     # depth quantisation bins for the scattering PSF

# --- Legacy 0-255-axis coefficients (DEAD unless complex_depth_mode: "normalized") ---
# Fenced off deliberately: `gamma` sits a few lines from `gamma_angular` with a nearly
# identical name and editing the wrong one produces BYTE-IDENTICAL GT with no error.
gamma:        [0.1, 0.1, 0.043]    # (normalized only) -- NOT gamma_angular
alpha:        [0.032, 0.032, 0.012]# (normalized only) -- NOT alpha_metric
turbu_p:      [0.15, 1.5]          # (ricardo only) [density, blur sigma]
s:            2                    # (ricardo only) stray SP multiplier; v2 follows Eq.6 exactly
kern_size:    10                   # (ricardo only) fixed kernel half-size
depth_add:    0                    # (normalized only) additive minimum depth. NEVER set this
                                   # on the metric axis -- it would add whole METRES of water
                                   # to every pixel. Confined to the normalized branch.

# --- Depth --------------------------------------------------------------------
nyu_max_depth_m:    10.0
make3d_max_depth_m: 80.0
# Option B (Make3D classical haze only): scale the per-metre Jerlov beta so 0-80 m
# scenes don't extinguish to flat airlight. t = exp(-(beta * make3d_haze_beta_scale) * z),
# with TRUE metric depth. Physically = "Make3D is viewed through clearer water".
# 0.125 (=10/80) matches NYU's attenuation-vs-depth. Used by BOTH the GT generator and
# the Make3D loader — keep in sync. NYU haze is unaffected.
make3d_haze_beta_scale: 0.125
# Make3D processing resolution [W, H] — raise to reduce the blocky/pixelated look
# (keep the generator and the data.make3d loader in sync).
make3d_full_size: [460, 345]
make3d_half_size: [230, 173]
depth_norm_max:     1000.0

# --- Model --------------------------------------------------------------------
pretrained_encoder: true    # ImageNet-pretrained DenseNet-169 encoder (all techniques)